<html lang="en">
<head>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&display=swap');
*{font-family:'Manrope',sans-serif}
body{background:#000;color:#fff}
.glass{background:rgba(255,255,255,.02);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.08)}
.card{transition:all.4s cubic-bezier(.175,.885,.32,1.275)}
.card:hover{transform:translateY(-16px);box-shadow:0 40px 80px rgba(139,92,246,.5)}
.btn{background:linear-gradient(135deg,#8b5cf6 0%,#d946ef 100%);box-shadow:0 10px 40px rgba(139,92,246,.5)}
.btn:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(139,92,246,.7)}
.premium{border:2px solid rgba(251,191,36,.5);background:linear-gradient(135deg,rgba(251,191,36,.1) 0%,rgba(245,158,11,.1) 100%)}

.modal.show{display:flex}
.active{background:rgba(139,92,246,.5)!important}
.rank1{background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 100%);box-shadow:0 0 50px rgba(251,191,36,.8)}
.rank2{background:linear-gradient(135deg,#e5e7eb 0%,#9ca3af 100%)}
.rank3{background:linear-gradient(135deg,#fb923c 0%,#ea580c 100%)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PASS='admin123';
const BIN='6a496fdeda38895dfe2eb3a2';
const KEY='$2a$10$XFxLWvcDN9GpcbLOaImaL.PQAJNkszEP5YvgEmtv.ev5e.5Wu5oqW';
const API=`https://api.jsonbin.io/v3/b/${BIN}`;
let lang='en',isAdmin=false,filter='votes',images=[],votes=JSON.parse(localStorage.getItem('votes')||'{}');

const T={
en:{title:'AI Art Championship',hero:'Global AI Art Championship',sub:'Upload unlimited. Compete globally. Win 100€ monthly.',explore:'Explore Gallery',support:'Support 1€',premium:'Go Premium 10€',admin:'Admin',login:'Login',pass:'Password',upload:'Upload Artworks',logout:'Logout',prize:'Monthly Prize Pool',first:'1st Place',second:'2nd Place',third:'3rd Place',votes:'votes',top:'Top Rated',new:'Newest',search:'Search...',premiumTitle:'Premium 10€',premiumDesc:'30 uploads + Priority listing + No ads + Badge',pay:'Pay with PayPal',freeAds:'FREE ADVERTISING FOR SPONSORS',contact:'Contact: admin@artcontest.pro'},
de:{title:'KI-Kunst Meisterschaft',hero:'Globale KI-Kunst Meisterschaft',sub:'Unbegrenzt hochladen. Global konkurrieren. 100€ monatlich gewinnen.',explore:'Galerie erkunden',support:'1€ Unterstützen',premium:'Premium 10€',admin:'Admin',login:'Anmelden',pass:'Passwort',upload:'Kunstwerke hochladen',logout:'Abmelden',prize:'Monatlicher Preispool',first:'1. Platz',second:'2. Platz',third:'3. Platz',votes:'Stimmen',top:'Top Bewertet',new:'Neueste',search:'Suchen...',premiumTitle:'Premium 10€',premiumDesc:'30 Uploads + Prioritätsliste + Keine Werbung + Abzeichen',pay:'Mit PayPal bezahlen',freeAds:'KOSTENLOSE WERBUNG FÜR SPONSOREN',contact:'Kontakt: admin@artcontest.pro'}
};
const t=k=>T[k]||k;

const DEMO=[
{id:999,name:'Support Creator',url:'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800',votes:9999,support:1},
{id:1,name:'Cyberpunk Neo Tokyo',url:'https://images.unsplash.com/photo-1531297484001-80022131f5a1?w=800',votes:247},
{id:2,name:'Ethereal Dragon',url:'https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=800',votes:198},
{id:3,name:'Quantum Space',url:'https://images.unsplash.com/photo-1462331940025-496dfbf21ff4?w=800',votes:176},
{id:4,name:'Neon Samurai',url:'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800',votes:163},
{id:5,name:'Mystic Forest',url:'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800',votes:142},
{id:6,name:'Android Soul',url:'https://images.unsplash.com/photo-1535378917042-10a22c95931a?w=800',votes:128},
{id:7,name:'Cosmic Dreams',url:'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=800',votes:115},
{id:8,name:'Future City',url:'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=800',votes:103},
{id:9,name:'Digital Phoenix',url:'https://images.unsplash.com/photo-1614728263952-84ea256f9679?w=800',votes:94},
{id:10,name:'Neon Waves',url:'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=800',votes:87},
{id:11,name:'Crystal Cave',url:'https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=800',votes:76},
{id:12,name:'Robo Warrior',url:'https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=800',votes:65}
];

async function loadDB(){
try{
const r=await fetch(`${API}/latest`,{headers:{'X-Master-Key':KEY}});
const d=await r.json();
images=d.record?.length?d.record:DEMO;
}catch{images=DEMO}
render();
}

async function saveDB(){
try{
await fetch(API,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':KEY},body:JSON.stringify(images)});
}catch{}
}

function render(){
const s=images.filter(i=>i.name.toLowerCase().includes((document.getElementById('search')?.value||'').toLowerCase()));
const sorted=[...s].sort((a,b)=>filter==='votes'?b.votes-a.votes:b.id-a.id);
document.getElementById('app').innerHTML=`
<header class="glass sticky top-0 z-50 border-b border-white/5 p-5">
<div class="max-w-[1800px] mx-auto flex justify-between items-center">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-gradient-to-br from-violet-600 to-pink-600 flex items-center justify-center"><i class="fas fa-bolt text-xl"></i></div>
<div><div class="text-2xl font-black">ArtContest<span class="text-violet-400">PRO</span></div><div class="text-xs text-gray-500">GLOBAL CHAMPIONSHIP</div></div>
</div>
<div class="flex gap-3">
<button onclick="setLang('en')" class="px-4 py-2 rounded glass ${lang==='en'?'active':''}">EN</button>
<button onclick="setLang('de')" class="px-4 py-2 rounded glass ${lang==='de'?'active':''}">DE</button>
<button onclick="openMod('premium')" class="px-5 py-2 rounded bg-gradient-to-r from-yellow-500 to-orange-500 font-bold"><i class="fas fa-crown mr-1"></i>Premium</button>
<button onclick="openMod('admin')" class="btn px-6 py-2 rounded font-bold"><i class="fas fa-shield mr-1"></i>${t('admin')}</button>
</div></div></header>

<div class="text-center py-32 px-6">
<h1 class="text-6xl md:text-8xl font-black mb-6">${t('hero')}</h1>
<p class="text-2xl text-gray-400 mb-10">${t('sub')}</p>
<div class="flex flex-wrap justify-center gap-4 mb-20">
<a href="#gallery" class="btn px-10 py-5 rounded-xl font-bold text-lg">${t('explore')}</a>
<a href="https://paypal.me/LjupchoJaneski/1EUR" target="_blank" class="glass px-10 py-5 rounded-xl font-bold text-lg border-2 border-pink-500/40">${t('support')}</a>
<button onclick="openMod('premium')" class="glass px-10 py-5 rounded-xl font-bold text-lg border-2 border-yellow-500/40">${t('premium')}</button>
</div>
<div class="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-6xl mx-auto">
<div class="glass rounded-3xl p-8"><div class="text-6xl font-black text-violet-400">${images.length}</div><div class="text-gray-400 text-sm uppercase">Artworks</div></div>
<div class="glass rounded-3xl p-8"><div class="text-6xl font-black text-blue-400">${images.reduce((a,b)=>a+(b.votes||0),0)}</div><div class="text-gray-400 text-sm uppercase">Votes</div></div>
<div class="glass rounded-3xl p-8"><div class="text-6xl font-black text-yellow-400">175€</div><div class="text-gray-400 text-sm uppercase">Prizes</div></div>
<div class="glass rounded-3xl p-8"><div class="text-6xl font-black text-green-400"><i class="fas fa-bolt"></i></div><div class="text-gray-400 text-sm uppercase">Live</div></div>
</div></div>

<div class="max-w-[1800px] mx-auto px-6 mb-12">
<div class="ads rounded-2xl p-6 text-center">
<i class="fas fa-bullhorn text-3xl text-blue-400 mb-3"></i>
<h3 class="text-xl font-bold mb-1">${t('freeAds')}</h3>
<p class="text-gray-400">${t('contact')}</p>
</div></div>

<div class="max-w-[1800px] mx-auto px-6 py-20">
<h2 class="text-6xl font-black text-center mb-16"><i class="fas fa-trophy text-yellow-400"></i> ${t('prize')}</h2>
<div class="grid md:grid-cols-3 gap-8 mb-20">
<div class="glass rounded-3xl p-10 text-center border-2 border-gray-500/30">
<div class="text-8xl mb-6">🥈</div><div class="text-3xl font-black mb-4">${t('second')}</div>
<div class="text-7xl font-black text-gray-300 mb-4">50€</div></div>
<div class="glass rounded-3xl p-10 text-center border-4 border-yellow-400/60 md:scale-110 md:-translate-y-6">
<div class="text-9xl mb-6">👑</div><div class="text-4xl font-black mb-4">${t('first')}</div>
<div class="text-8xl font-black text-yellow-300 mb-4">100€</div></div>
<div class="glass rounded-3xl p-10 text-center border-2 border-orange-500/30">
<div class="text-8xl mb-6">🥉</div><div class="text-3xl font-black mb-4">${t('third')}</div>
<div class="text-7xl font-black text-orange-400 mb-4">25€</div></div>
</div></div>

<div id="gallery" class="max-w-[1800px] mx-auto px-6 mb-12">
<div class="glass rounded-2xl p-6 flex flex-wrap gap-4 justify-between items-center">
<div class="flex gap-3">
<button onclick="setFilter('votes')" class="px-6 py-3 rounded-xl ${filter==='votes'?'bg-violet-600':'glass'} font-bold">${t('top')}</button>
<button onclick="setFilter('new')" class="px-6 py-3 rounded-xl ${filter==='new'?'bg-violet-600':'glass'} font-bold">${t('new')}</button>
</div>
<input id="search" oninput="render()" placeholder="${t('search')}" class="px-6 py-3 rounded-xl bg-white/5 border border-white/10 w-full md:w-96">
</div></div>

<div class="max-w-[1800px] mx-auto px-6 pb-32">
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
${sorted.map((img,i)=>`
<div class="card glass rounded-2xl overflow-hidden ${img.support?'support':''}">
<div class="relative">
<img src="${img.url}" class="w-full h-72 object-cover">
${i<3&&!img.support?`<div class="absolute top-3 left-3 w-12 h-12 rounded-full ${i===0?'rank1':i===1?'rank2':'rank3'} flex items-center justify-center font-black text-xl">${i+1}</div>`:''}
${img.support?`<div class="absolute top-3 right-3 px-4 py-2 rounded-full bg-pink-600 font-bold text-sm">1€</div>`:''}
</div>
<div class="p-5">
<div class="font-bold text-lg mb-3">${img.name}</div>
<div class="flex justify-between items-center">
<span class="text-gray-400">${img.votes} ${t('votes')}</span>
${img.support?`<a href="https://paypal.me/LjupchoJaneski/1EUR" target="_blank" class="px-5 py-2 rounded-lg bg-pink-600 font-bold">Support</a>`:`
<button onclick="vote(${img.id})" ${votes[img.id]?'disabled':''} class="px-5 py-2 rounded-lg ${votes[img.id]?'bg-gray-600':'bg-violet-600 hover:bg-violet-700'} font-bold">
<i class="fas fa-heart mr-1"></i>${votes[img.id]?'Voted':'Vote'}</button>`}
</div>
${isAdmin&&!img.support?`<button onclick="delImg(${img.id})" class="w-full mt-3 py-2 rounded-lg bg-red-600 font-bold">Delete</button>`:''}
</div></div>`).join('')}
</div></div>

<div id="modal" class="modal">
<div class="glass rounded-3xl p-10 max-w-2xl w-full mx-4">
<div id="adminView">
<h2 class="text-4xl font-black mb-8">${t('admin')} Login</h2>
<input type="password" id="passInp" placeholder="${t('pass')}" class="w-full px-6 py-4 rounded-xl bg-white/10 mb-6 text-lg">
<button onclick="login()" class="w-full btn py-4 rounded-xl font-bold text-xl mb-4">${t('login')}</button>
<button onclick="closeMod()" class="w-full py-3 rounded-xl bg-white/10">Close</button>
</div>
<div id="uploadView" class="hidden">
<h2 class="text-4xl font-black mb-8">${t('upload')}</h2>
<input type="file" id="fileInp" multiple accept="image/*" class="w-full mb-6 text-lg">
<button onclick="upload()" class="w-full btn py-4 rounded-xl font-bold text-xl mb-4">Upload to Cloud</button>
<button onclick="logout()" class="w-full py-3 rounded-xl bg-white/10">${t('logout')}</button>
</div>
<div id="premiumView" class="hidden">
<h2 class="text-4xl font-black mb-6">${t('premiumTitle')}</h2>
<div class="text-center mb-8">
<div class="text-7xl font-black text-yellow-400 mb-4">10€</div>
<p class="text-xl text-gray-300">${t('premiumDesc')}</p>
</div>
<a href="https://paypal.me/LjupchoJaneski/10EUR" target="_blank" class="block w-full bg-gradient-to-r from-yellow-500 to-orange-500 py-4 rounded-xl font-black text-xl text-center mb-4">
<i class="fab fa-paypal mr-2"></i>${t('pay')}
</a>
<button onclick="closeMod()" class="w-full py-3 rounded-xl bg-white/10">Close</button>
</div>
</div></div>
`;
}

function setLang(l){lang=l;render()}
function setFilter(f){filter=f;render()}
function openMod(t){
document.getElementById('modal').classList.add('show');
document.getElementById('adminView').style.display=t==='admin'&&!isAdmin?'block':'none';
document.getElementById('uploadView').style.display=t==='admin'&&isAdmin?'block':'none';
document.getElementById('premiumView').style.display=t==='premium'?'block':'none';
}
function closeMod(){document.getElementById('modal').classList.remove('show')}
function login(){
if(document.getElementById('passInp').value===PASS){isAdmin=true;openMod('admin');render()}
else alert('Wrong password');
}
function logout(){isAdmin=false;closeMod();render()}
function upload(){
const files=document.getElementById('fileInp').files;
Array.from(files).forEach(f=>{
const r=new FileReader();
r.onload=e=>{images.push({id:Date.now()+Math.random(),name:f.name.replace(/\.[^/.]+$/,""),url:e.target.result,votes:0});saveDB();render()};
r.readAsDataURL(f);
});
closeMod();
}
function vote(id){
if(votes[id])return;
const img=images.find(i=>i.id===id);
if(img&&!img.support){img.votes++;votes[id]=1;localStorage.setItem('votes',JSON.stringify(votes));saveDB();render()}
}
function delImg(id){
if(!isAdmin)return;
images=images.filter(i=>i.id!==id);
saveDB();render();
}
loadDB();
</script>
</body>
</html>

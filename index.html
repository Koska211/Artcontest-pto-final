<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Art Championship 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Space Grotesk', sans-serif; }
       .font-orbitron { font-family: 'Orbitron', sans-serif; }
        body {
            background: #0a0a0f;
            background-image: 
                radial-gradient(at 20% 30%, hsla(280,100%,50%,0.15) 0px, transparent 50%),
                radial-gradient(at 80% 70%, hsla(190,100%,50%,0.15) 0px, transparent 50%);
        }
       .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
       .glow { box-shadow: 0 0 30px rgba(139, 92, 246, 0.3); }
       .btn-gradient {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            transition: all 0.3s;
        }
       .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
        }
       .vote-btn:active { animation: pulse 0.3s; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body class="text-white min-h-screen">
    <!-- Header -->
    <header class="glass sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-trophy text-3xl text-yellow-400"></i>
                <div>
                    <h1 class="font-orbitron text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">GLOBAL AI ART</h1>
                    <p class="text-xs text-gray-400">Championship 2025</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleLang()" id="langBtn" class="glass px-4 py-2 rounded-lg hover:bg-white/10">
                    <i class="fas fa-globe mr-2"></i>EN
                </button>
                <button onclick="showAdmin()" class="glass px-4 py-2 rounded-lg hover:bg-white/10">
                    <i class="fas fa-lock mr-2"></i>Admin
                </button>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="max-w-7xl mx-auto px-4 py-12 text-center">
        <h2 class="font-orbitron text-5xl md:text-7xl font-black mb-6 bg-gradient-to-r from-purple-400 via-pink-400 to-cyan-400 bg-clip-text text-transparent" data-i18n="title">
            Global AI Art Championship
        </h2>
        <p class="text-xl text-gray-300 mb-8" data-i18n="subtitle">Vote for the best AI artworks. Winner takes all.</p>
        
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-xl p-6">
                <div class="text-3xl font-bold text-purple-400" id="totalVotes">0</div>
                <div class="text-sm text-gray-400" data-i18n="votes">Votes</div>
            </div>
            <div class="glass rounded-xl p-6">
                <div class="text-3xl font-bold text-pink-400" id="totalArts">12</div>
                <div class="text-sm text-gray-400" data-i18n="artworks">Artworks</div>
            </div>
            <div class="glass rounded-xl p-6">
                <div class="text-3xl font-bold text-cyan-400">€<span id="totalPrize">0</span></div>
                <div class="text-sm text-gray-400" data-i18n="prizePool">Prize Pool</div>
            </div>
            <div class="glass rounded-xl p-6">
                <div class="text-3xl font-bold text-yellow-400">3</div>
                <div class="text-sm text-gray-400" data-i18n="winners">Winners</div>
            </div>
        </div>

        <!-- Prizes -->
        <div class="glass rounded-2xl p-6 mb-8">
            <h3 class="font-orbitron text-2xl mb-4" data-i18n="prizes">🏆 Prizes</h3>
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-gradient-to-br from-yellow-500/20 to-yellow-600/20 rounded-xl p-4 border border-yellow-500/30">
                    <div class="text-3xl mb-2">🥇</div>
                    <div class="text-2xl font-bold text-yellow-400">€100</div>
                    <div class="text-sm text-gray-400" data-i18n="first">1st Place</div>
                </div>
                <div class="bg-gradient-to-br from-gray-400/20 to-gray-500/20 rounded-xl p-4 border border-gray-400/30">
                    <div class="text-3xl mb-2">🥈</div>
                    <div class="text-2xl font-bold text-gray-300">€50</div>
                    <div class="text-sm text-gray-400" data-i18n="second">2nd Place</div>
                </div>
                <div class="bg-gradient-to-br from-orange-600/20 to-orange-700/20 rounded-xl p-4 border border-orange-600/30">
                    <div class="text-3xl mb-2">🥉</div>
                    <div class="text-2xl font-bold text-orange-400">€25</div>
                    <div class="text-sm text-gray-400" data-i18n="third">3rd Place</div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-4 justify-center mb-8">
            <button onclick="window.open('https://paypal.me/MarkoMitrovic5/1EUR','_blank')" class="btn-gradient px-8 py-4 rounded-xl font-bold">
                <i class="fas fa-heart mr-2"></i><span data-i18n="support">Support Creator 1€</span>
            </button>
            <button onclick="window.open('https://paypal.me/MarkoMitrovic5/10EUR','_blank')" class="bg-gradient-to-r from-yellow-500 to-orange-500 px-8 py-4 rounded-xl font-bold hover:scale-105 transition">
                <i class="fas fa-crown mr-2"></i><span data-i18n="premium">Premium Vote 10€</span>
            </button>
            <button onclick="showSponsors()" class="glass px-8 py-4 rounded-xl font-bold hover:bg-white/10">
                <i class="fas fa-ad mr-2"></i><span data-i18n="sponsor">FREE ADS</span>
            </button>
        </div>
    </section>

    <!-- Leaderboard -->
    <section class="max-w-7xl mx-auto px-4 mb-12">
        <h3 class="font-orbitron text-3xl mb-6 text-center" data-i18n="leaderboard">🏅 Leaderboard</h3>
        <div id="leaderboard" class="glass rounded-2xl p-6"></div>
    </section>

    <!-- Gallery -->
    <section class="max-w-7xl mx-auto px-4 pb-12">
        <h3 class="font-orbitron text-3xl mb-6 text-center" data-i18n="gallery">🎨 Gallery</h3>
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <!-- Admin Panel -->
    <div id="adminPanel" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 max-w-md w-full">
            <h3 class="font-orbitron text-2xl mb-6">Admin Panel</h3>
            <div id="adminLogin">
                <input type="password" id="adminPass" placeholder="Password" class="w-full glass rounded-lg px-4 py-3 mb-4 bg-transparent">
                <button onclick="loginAdmin()" class="btn-gradient w-full py-3 rounded-lg font-bold">Login</button>
                <button onclick="closeAdmin()" class="w-full mt-2 glass py-3 rounded-lg">Cancel</button>
            </div>
            <div id="adminUpload" class="hidden">
                <h4 class="mb-4 font-bold">Upload New Artwork</h4>
                <input type="text" id="artTitle" placeholder="Artwork Title" class="w-full glass rounded-lg px-4 py-3 mb-3 bg-transparent">
                <input type="text" id="artAuthor" placeholder="Author Name" class="w-full glass rounded-lg px-4 py-3 mb-3 bg-transparent">
                <input type="text" id="artImage" placeholder="Image URL" class="w-full glass rounded-lg px-4 py-3 mb-4 bg-transparent">
                <button onclick="uploadArt()" class="btn-gradient w-full py-3 rounded-lg font-bold mb-2">
                    <i class="fas fa-upload mr-2"></i>Upload
                </button>
                <button onclick="closeAdmin()" class="w-full glass py-3 rounded-lg">Close</button>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Global AI Art Championship",
                subtitle: "Vote for the best AI artworks. Winner takes all.",
                votes: "Votes", artworks: "Artworks", prizePool: "Prize Pool", winners: "Winners",
                prizes: "🏆 Prizes", first: "1st Place", second: "2nd Place", third: "3rd Place",
                support: "Support Creator 1€", premium: "Premium Vote 10€", sponsor: "FREE ADS",
                leaderboard: "🏅 Leaderboard", gallery: "🎨 Gallery", vote: "Vote", voted: "Voted!"
            },
            de: {
                title: "Globale KI-Kunst-Meisterschaft",
                subtitle: "Stimme für die besten KI-Kunstwerke. Der Gewinner bekommt alles.",
                votes: "Stimmen", artworks: "Kunstwerke", prizePool: "Preispool", winners: "Gewinner",
                prizes: "🏆 Preise", first: "1. Platz", second: "2. Platz", third: "3. Platz",
                support: "Unterstütze Creator 1€", premium: "Premium Vote 10€", sponsor: "KOSTENLOSE ADS",
                leaderboard: "🏅 Rangliste", gallery: "🎨 Galerie", vote: "Abstimmen", voted: "Gewählt!"
            }
        };

        let currentLang = 'en';
        let artworks = JSON.parse(localStorage.getItem('artworks')) || [
            {id: 1, title: "Cyberpunk City", author: "AI_Master", image: "https://picsum.photos/400/400?random=1", votes: 0},
            {id: 2, title: "Dragon Realm", author: "FantasyAI", image: "https://picsum.photos/400/400?random=2", votes: 0},
            {id: 3, title: "Space Odyssey", author: "CosmicArt", image: "https://picsum.photos/400/400?random=3", votes: 0},
            {id: 4, title: "Neon Dreams", author: "GlowAI", image: "https://picsum.photos/400/400?random=4", votes: 0},
            {id: 5, title: "Forest Spirit", author: "NatureAI", image: "https://picsum.photos/400/400?random=5", votes: 0},
            {id: 6, title: "Robot Wars", author: "MechMaster", image: "https://picsum.photos/400/400?random=6", votes: 0},
            {id: 7, title: "Ocean Depths", author: "DeepAI", image: "https://picsum.photos/400/400?random=7", votes: 0},
            {id: 8, title: "Abstract Mind", author: "ThoughtAI", image: "https://picsum.photos/400/400?random=8", votes: 0},
            {id: 9, title: "Steampunk", author: "GearAI", image: "https://picsum.photos/400/400?random=9", votes: 0},
            {id: 10, title: "Galactic War", author: "StarAI", image: "https://picsum.photos/400/400?random=10", votes: 0},
            {id: 11, title: "Mystic Portal", author: "PortalAI", image: "https://picsum.photos/400/400?random=11", votes: 0},
            {id: 12, title: "Digital Soul", author: "SoulAI", image: "https://picsum.photos/400/400?random=12", votes: 0}
        ];

        function saveData() {
            localStorage.setItem('artworks', JSON.stringify(artworks));
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = artworks.map(art => `
                <div class="glass rounded-2xl overflow-hidden glow hover:scale-105 transition">
                    <img src="${art.image}" alt="${art.title}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h4 class="font-bold text-xl mb-2">${art.title}</h4>
                        <p class="text-gray-400 text-sm mb-4">by ${art.author}</p>
                        <div class="flex justify-between items-center">
                            <div class="text-2xl font-bold text-purple-400">
                                <i class="fas fa-heart mr-2"></i>${art.votes}
                            </div>
                            <button onclick="vote(${art.id})" class="vote-btn btn-gradient px-6 py-2 rounded-lg font-bold">
                                <i class="fas fa-thumbs-up mr-2"></i><span data-i18n="vote">Vote</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            updateStats();
            renderLeaderboard();
        }

        function vote(id) {
            const art = artworks.find(a => a.id === id);
            art.votes++;
            saveData();
            renderGallery();
        }

        function updateStats() {
            const totalVotes = artworks.reduce((sum, art) => sum + art.votes, 0);
            document.getElementById('totalVotes').textContent = totalVotes;
            document.getElementById('totalArts').textContent = artworks.length;
            document.getElementById('totalPrize').textContent = totalVotes;
        }

        function renderLeaderboard() {
            const sorted = [...artworks].sort((a, b) => b.votes - a.votes).slice(0, 5);
            document.getElementById('leaderboard').innerHTML = sorted.map((art, i) => `
                <div class="flex items-center gap-4 p-4 ${i === 0? 'bg-yellow-500/10 border-yellow-500/30' : 'bg-white/5'} rounded-xl mb-3">
                    <div class="text-3xl font-orbitron font-bold ${i === 0? 'text-yellow-400' : i === 1? 'text-gray-300' : i === 2? 'text-orange-400' : 'text-gray-500'}">
                        ${i === 0? '🥇' : i === 1? '🥈' : i === 2? '🥉' : '#' + (i+1)}
                    </div>
                    <img src="${art.image}" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-1">
                        <div class="font-bold">${art.title}</div>
                        <div class="text-sm text-gray-400">by ${art.author}</div>
                    </div>
                    <div class="text-2xl font-bold text-purple-400">
                        <i class="fas fa-heart mr-1"></i>${art.votes}
                    </div>
                </div>
            `).join('');
        }

        function toggleLang() {
            currentLang = currentLang === 'en'? 'de' : 'en';
            document.getElementById('langBtn').innerHTML = `<i class="fas fa-globe mr-2"></i>${currentLang.toUpperCase()}`;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.textContent = translations[currentLang][key];
            });
        }

        function showAdmin() {
            document.getElementById('adminPanel').classList.remove('hidden');
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('adminLogin').classList.remove('hidden');
            document.getElementById('adminUpload').classList.add('hidden');
            document.getElementById('adminPass').value = '';
        }

        function loginAdmin() {
            if (document.getElementById('adminPass').value === 'admin123') {
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminUpload').classList.remove('hidden');
            } else {
                alert('Wrong password!');
            }
        }

        function uploadArt() {
            const title = document.getElementById('artTitle').value;
            const author = document.getElementById('artAuthor').value;
            const image = document.getElementById('artImage').value;
            if (!title ||!author ||!image) return alert('Fill all fields!');
            
            artworks.push({
                id: Date.now(),
                title, author, image, votes: 0
            });
            saveData();
            renderGallery();
            closeAdmin();
            alert('Artwork uploaded!');
        }

        function showSponsors() {
            alert('FREE ADS for sponsors! Contact: your@email.com');
        }

        renderGallery();
    </script>
</body>
</html>
